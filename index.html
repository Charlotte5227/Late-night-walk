<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>深夜の散歩記録</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
  <button id="calendar-btn" aria-label="記録を見る">📅</button>

  <div id="calendar-modal" class="hidden">
    <div class="modal-header">
      <h2>散歩記録</h2>
      <button id="close-calendar-btn">×</button>
    </div>
    <ul id="record-list"></ul>
  </div>

  <div id="map"></div>

  <div id="controls">
    <div id="timer">00:00</div>
    <div class="btn-group">
      <button id="start-stop-btn" class="start">開始</button>
      <button id="save-path-btn" class="save-hidden">経路を保存</button>
    </div>
  </div>

  <div id="calories-info">
    <span>15分: 約50kcal</span>
    <span>30分: 約100kcal</span>
    <span>45分: 約150kcal</span>
    <span>60分: 約200kcal</span>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
